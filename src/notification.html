<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Notify</title>
    <link rel="stylesheet" href="notification.css">
  </head>
  <body>
    <main class="notification-shell">
      <button type="button" class="notification-bubble" id="notificationBubble" aria-label="Apri notifiche">
        <span class="notification-bubble__icon" aria-hidden="true">&#128276;</span>
        <span class="notification-bubble__count" id="notificationBubbleCount">0</span>
      </button>
      <button type="button" class="notification-content" id="notificationContent">
        <span class="eyebrow">Tech Notify</span>
        <strong id="notificationTitle">Notifica</strong>
        <span id="notificationBody"></span>
      </button>
      <button type="button" class="close-button" id="closeButton">Chiudi</button>
    </main>
    <script src="notification.js"></script>
  </body>
</html>
